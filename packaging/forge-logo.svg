<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Forge Logo -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#1e1e2e" stroke="#89b4fa" stroke-width="2"/>
  
  <!-- Anvil shape (representing "forge") -->
  <path d="M30 70 L35 45 L65 45 L70 70 Z" fill="url(#grad)" />
  <rect x="45" y="30" width="10" height="20" rx="2" fill="#f38ba8" />
  <rect x="35" y="25" width="30" height="8" rx="2" fill="#a6e3a1" />
  
  <!-- Sparks -->
  <circle cx="50" cy="20" r="2" fill="#f9e2af" opacity="0.8" />
  <circle cx="40" cy="22" r="1.5" fill="#f38ba8" opacity="0.6" />
  <circle cx="60" cy="22" r="1.5" fill="#89b4fa" opacity="0.6" />
</svg>
