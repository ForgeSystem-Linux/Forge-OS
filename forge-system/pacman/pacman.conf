# Forge System - Pacman Configuration
# Restricts package installation to Flatpak only

[options]
RootDir = /
CacheDir = /var/cache/pacman/pkg/
LogFile = /var/log/pacman.log
GPGDir = /etc/pacman.d/gnupg
HookDir = /etc/pacman.d/hooks/
Architecture = auto

# Forge repos
SigLevel = Optional TrustAll
Server = https://archlinux.org/repos/$repo/os/$arch

# Forge custom repo (immutable packages)
SigLevel = Required DatabaseOptional
Server = https://forge-linux.org/repo/$arch

[forge]
SigLevel = Required DatabaseOptional
Server = https://forge-linux.org/repo/$arch

# Block system package installation
# Users must use Flatpak for applications
IgnorePkg = *
# Only allow forge system packages
IgnoreGroup =
