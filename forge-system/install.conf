[options]
RootPartition=ROOT
RootSubvol=@
SwapPartition=SWAP
Hostname=forge-pc
Locale=en_US.UTF-8
Keymap=us

[bootloader]
Type=limine
Timeout=0
Console=false

[bootloader.plymouth]
Theme=forge
Enable=true

[packages]
Include=forge-compositor forge-shell forge-greeter forge-notifications forge-session forge-privilege forge-clip forge-screenshot forge-settings
Include=alacritty
Include=flatpak xdg-utils xdg-desktop-portal
Include=mesa libinput libseat libgbm
Include=qt6-base qt6-declarative qt6-wayland
Include=polkit dbus
Include=pipewire wireplumber

[packages.exclude]
# Block native package installation via pacman policy
IgnorePkgs=*

[flatpak]
Remotes=flathub=https://flathub.org/repo/flathub.flatpakrepo
Install=org.mozilla.firefox
Install=com.google.Chrome
Install=org.libreoffice.LibreOffice
Install=com.discord.Discord
Install=org.spotify.Client
Install=io.github.nickvision钱袋
Install=com.obsproject.Studio

[users]
CreateUser=admin
Groups=wheel,video,audio,input
Shell=/bin/bash

[post_install]
EnableServices=forge-greeter forge-compositor NetworkManager bluetooth
DisableServices=getty@tty1

[immutable]
RootReadOnly=true
VarSubvol=@var
HomeSubvol=@home
